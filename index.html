        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; display: flex; gap: 20px; }
        
        /* Sidebar laterale per la selezione */
        .sidebar { flex: 0 0 300px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); height: fit-content; max-height: 90vh; overflow-y: auto; }
        .sidebar h2 { margin-top: 0; font-size: 1.2rem; color: #1a237e; }
        .course-item { display: flex; align-items: center; margin-bottom: 8px; padding: 5px; border-radius: 4px; transition: background 0.2s; cursor: pointer; }
        .course-item:hover { background: #f5f5f5; }
        .course-item input { margin-right: 10px; transform: scale(1.2); }
        .btn-reset { display: block; width: 100%; padding: 10px; background: #ff5252; color: white; border: none; border-radius: 6px; cursor: pointer; margin-bottom: 15px; font-weight: bold; }

        /* Calendario */
        .main-content { flex: 1; }
        .month-container { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .month-title { text-align: center; color: #333; margin-bottom: 20px; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 1px; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day-header { text-align: center; font-weight: bold; color: #777; padding: 10px 0; background: #fafafa; border-radius: 4px; }
        
        .day-cell { min-height: 120px; border: 1px solid #eee; border-radius: 8px; padding: 8px; background: #fff; position: relative; }
        .day-cell.empty { background: transparent; border: none; }
        .day-number { font-weight: bold; font-size: 1.1rem; color: #444; margin-bottom: 5px; display: block; }
        
        /* Stile degli esami dentro i giorni */
        .exam-tag { font-size: 0.75rem; padding: 6px; margin-bottom: 4px; border-radius: 4px; border-left: 4px solid; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .exam-tag.scritto { background: #e3f2fd; border-color: #1565c0; color: #0d47a1; }
        .exam-tag.orale { background: #fff3e0; border-color: #ef6c00; color: #e65100; }
        .exam-tag.pratica { background: #e8f5e9; border-color: #2e7d32; color: #1b5e20; }
        
        .exam-time { font-weight: bold; display: block; }
        .exam-room { font-style: italic; display: block; font-size: 0.7rem; color: #555; }

        @media (max-width: 768px) { .container { flex-direction: column; } .sidebar { width: auto; max-height: 300px; } }
    </style>

    let selectedCourses = new Set();

    // Inizializza: estrai corsi unici, popola sidebar e disegna calendario
    function init() {
        const uniqueCourses = [...new Set(rawData.map(item => item.mat))].sort();
        const listDiv = document.getElementById('courseList');
        
        uniqueCourses.forEach(course => {
            const div = document.createElement('div');
            div.className = 'course-item';
            div.innerHTML = `<label style="width:100%; cursor:pointer; display:flex; align-items:center;">
                                <input type="checkbox" value="${course}" onchange="toggleCourse(this)">
                                ${course}
                             </label>`;
            listDiv.appendChild(div);
        });

        drawCalendar();
    }

    function toggleCourse(checkbox) {
        if (checkbox.checked) {
            selectedCourses.add(checkbox.value);
        } else {
            selectedCourses.delete(checkbox.value);
        }
        drawCalendar();
    }

    function resetSelection() {
        selectedCourses.clear();
        document.querySelectorAll('input[type="checkbox"]').forEach(el => el.checked = false);
        drawCalendar();
    }

    function drawCalendar() {
        const container = document.getElementById('calendarArea');
        container.innerHTML = '';

        // Disegna Giugno e Luglio 2026
        renderMonth(2026, 5, container); // 5 = Giugno
        renderMonth(2026, 6, container); // 6 = Luglio
    }

    function renderMonth(year, month, container) {
        const monthNames = ["Gennaio", "Febbraio", "Marzo", "Aprile", "Maggio", "Giugno", "Luglio", "Agosto", "Settembre", "Ottobre", "Novembre", "Dicembre"];
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        
        // Calcola giorno settimana inizio mese (Lun=0...Dom=6 per gestire layout italiano)
        let firstDay = new Date(year, month, 1).getDay();
        // Converti: Dom(0) -> 6, Lun(1) -> 0
        firstDay = (firstDay === 0) ? 6 : firstDay - 1;

        const wrapper = document.createElement('div');
        wrapper.className = 'month-container';
        
        let html = `<h3 class="month-title">${monthNames[month]} ${year}</h3>`;
        html += `<div class="calendar-grid">`;
        
        // Header Giorni
        const days = ['Lun', 'Mar', 'Mer', 'Gio', 'Ven', 'Sab', 'Dom'];
        days.forEach(d => html += `<div class="day-header">${d}</div>`);

        // Celle vuote prima del primo giorno
        for (let i = 0; i < firstDay; i++) {
            html += `<div class="day-cell empty"></div>`;
        }

        // Giorni del mese
        for (let day = 1; day <= daysInMonth; day++) {
            // Cerca esami per questo giorno
            const currentDtStr = `${year}-${String(month+1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            
            // Filtra esami: deve coincidere la data E il corso deve essere selezionato
            const daysExams = rawData.filter(ex => {
                const exDate = ex.dt.split(' ')[0];
                return exDate === currentDtStr && selectedCourses.has(ex.mat);
            });

            html += `<div class="day-cell">
                        <span class="day-number">${day}</span>`;
            
            daysExams.forEach(ex => {
                const time = ex.dt.split(' ')[1];
                let typeClass = "";
                if(ex.tipo.toLowerCase().includes("scritto")) typeClass = "scritto";
                else if(ex.tipo.toLowerCase().includes("orale")) typeClass = "orale";
                else if(ex.tipo.toLowerCase().includes("pratica")) typeClass = "pratica";

                html += `<div class="exam-tag ${typeClass}">
                            <span class="exam-time">${time} - ${ex.mat}</span>
                            <span class="exam-room">📍 ${ex.aula} (${ex.tipo})</span>
                         </div>`;
            });

            html += `</div>`;
        }

        html += `</div>`; // Chiude grid
        wrapper.innerHTML = html;
        container.appendChild(wrapper);
    }

    // Avvia tutto
    init();
